    p { color: #cbd5e1; margin: 0.5rem 0 1.25rem; }
    a { color: #22d3ee; text-decoration: none; border: 1px solid #22d3ee; padding: 0.6rem 1rem; border-radius: 8px; }

<body>
  <div class="card">
    <h1>Sin conexión</h1>
    <p>Puedes seguir usando la app offline si ya estaba abierta antes.</p>
