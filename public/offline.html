<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No tienes conexión - Colonia Alerta</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #020617; color: #f8fafc; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .icon-box { background: #0ea5e9; padding: 1.5rem; border-radius: 1.5rem; margin-bottom: 2rem; box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.3); }
    h1 { margin: 0 0 0.5rem; font-size: 1.5rem; font-weight: 700; }
    p { color: #94a3b8; margin: 0.5rem 0 2.5rem; max-width: 280px; line-height: 1.5; font-size: 0.9rem; }
    .btn { background: #0284c7; color: white; border: none; padding: 0.75rem 2rem; border-radius: 0.75rem; font-weight: 600; text-decoration: none; transition: all 0.2s; cursor: pointer; }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div class="icon-box">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
  </div>
  <h1>No tienes conexión</h1>
  <p>Parece que no hay internet. Puedes seguir registrando incidencias y se enviarán cuando recuperes la señal.</p>
  <button class="btn" onclick="window.location.reload()">Reintentar</button>
</body>
</html>
